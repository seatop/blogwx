<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/favicon.ico' | relative_url }}">
</head>
<body>
  <header>
    <h1>🌙 {{ site.title }}</h1>
    <p>{{ site.tagline }}</p>
  </header>
  
  <nav>
    <a href="{{ '/' | relative_url }}">首页</a>
    <a href="/fiction/">悬疑小说</a>
    <a href="/puzzle/">思维趣题</a>
    <a href="/about/">关于</a>
  </nav>
  
  <div class="container">
    {{ content }}
  </div>
  
  <footer>
    <p>© 2026 星期天书房 · Powered by Jekyll</p>
    <p>原创内容 · 禁止转载</p>
  </footer>
</body>
</html>
