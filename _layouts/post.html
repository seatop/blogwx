---
layout: default
---

<article class="post-content">
  <h1>{{ page.title }}</h1>
  
  <div class="post-meta">
    <span>📅 {{ page.date | date: "%Y年%m月%d日" }}</span>
    {% if page.tags %}
    <span style="margin-left: 20px;">
      {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
      {% endfor %}
    </span>
    {% endif %}
  </div>
  
  {{ content }}
</article>
